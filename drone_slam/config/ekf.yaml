ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: body # Matches RTAB-Map frame_id
    world_frame: odom

    # Source 1: Fast-LIO2 Odometry
    odom0: /Odometry
    odom0_config: [
        true,
        true,
        true, # X, Y, Z
        true,
        true,
        true, # Roll, Pitch, Yaw
        false,
        false,
        false, # X_vel, Y_vel, Z_vel
        false,
        false,
        false, # Roll_vel, Pitch_vel, Yaw_vel
        false,
        false,
        false,
      ] # Accel

    # Source 2: PX4 SITL Odometry (Update topic name as needed)
    odom1: /fmu/out/vehicle_odometry
    odom1_config:
      [
        false,
        false,
        false,
        false,
        false,
        false,
        true,
        true,
        true,
        true,
        true,
        true,
        false,
        false,
        false,
      ]
